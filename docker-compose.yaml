# =============================================================================
# docker-compose.yml
# Retail Demand Forecasting — Full Stack Orchestration
#
# Services:
#   postgres      → Data Warehouse (PostgreSQL 15)
#   zookeeper     → Kafka dependency
#   kafka         → Event streaming broker
#   airflow-init  → One-time Airflow DB init
#   airflow-web   → Airflow web UI (port 8080)
#   airflow-sched → Airflow scheduler
#   spark-master  → Spark master node
#   spark-worker  → Spark worker node
#   streamlit     → Analytics dashboard (port 8501)
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f airflow-scheduler
# =============================================================================

version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0jIkd-Q="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Pipeline env vars
    DATA_LAKE_PATH: /opt/airflow/data
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    DATABASE_URL: postgresql://airflow:airflow@postgres:5432/retail_dw
    PG_JDBC_URL: jdbc:postgresql://postgres:5432/retail_dw
    PG_USER: airflow
    PG_PASSWORD: airflow
    SPARK_HOME: /opt/spark
    SPARK_MASTER: local[2]
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark:/opt/airflow/spark
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ─── POSTGRESQL (Airflow metastore + Data Warehouse) ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: retail_postgres
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema/star_schema.sql:/docker-entrypoint-initdb.d/02_star_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ─── ZOOKEEPER ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: retail_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ─── KAFKA ────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: retail_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID:                     1
      KAFKA_ZOOKEEPER_CONNECT:             zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:          PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:     "true"
      KAFKA_LOG_RETENTION_HOURS:           24
    ports:
      - "29092:29092"   # host access
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 20s
      retries: 5
    restart: unless-stopped

  # Create required Kafka topics on startup
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.3
    container_name: retail_kafka_setup
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --create --if-not-exists
          --bootstrap-server kafka:9092
          --topic ecommerce_events
          --partitions 6
          --replication-factor 1 &&
        kafka-topics --create --if-not-exists
          --bootstrap-server kafka:9092
          --topic ecommerce_events_dlq
          --partitions 2
          --replication-factor 1
        echo 'Kafka topics created.'
      "
    restart: on-failure

  # ─── AIRFLOW INIT ─────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: retail_airflow_init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@retail.com
          --password admin
      "
    restart: on-failure

  # ─── AIRFLOW WEBSERVER ────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: retail_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── AIRFLOW SCHEDULER ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: retail_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── SPARK ────────────────────────────────────────────────────────────────
  # Official Apache Spark image (replaces deprecated bitnami/spark:3.5)
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: retail_spark_master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8090:8080"   # Spark UI (8090 to avoid clash with Airflow)
      - "7077:7077"   # Spark master RPC port
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 20s
      retries: 5
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: retail_spark_worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE:  "true"
      SPARK_WORKER_CORES:  "2"
      SPARK_WORKER_MEMORY: "2g"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
    restart: unless-stopped

  # ─── KAFKA PRODUCER (optional — remove if running manually) ───────────────
  kafka-producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: retail_kafka_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # ─── KAFKA CONSUMER ───────────────────────────────────────────────────────
  kafka-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: retail_kafka_consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/retail_dw
      DATA_LAKE_PATH: /app/data
    depends_on:
      postgres:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # ─── STREAMLIT DASHBOARD ──────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: retail_dashboard
    environment:
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/retail_dw
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./streamlit:/app/streamlit
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  airflow_logs:

networks:
  default:
    name: retail_pipeline_net