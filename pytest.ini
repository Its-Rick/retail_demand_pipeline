# pytest.ini
# Configuration for the Retail Demand Pipeline test suite

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    slow: marks tests as slow (Spark tests) — run with -m slow
    integration: marks tests requiring live DB/Kafka connections
    unit: pure unit tests with no external dependencies

# Warnings filter
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:pyspark

# Log capture
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_date_format = %H:%M:%S
